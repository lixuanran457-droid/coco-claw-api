server:
  port: 8080

spring:
  application:
    name: coco-claw-api

  # MySQL 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/coco_claw?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cococlown.cococlawservice.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Nacos 注册中心配置
nacos:
  discovery:
    enabled: true
    server-addr: 124.243.191.159:8848
    namespace: public
    group: DEFAULT_GROUP
  config:
    enabled: true
    server-addr: 124.243.191.159:8848
    namespace: public
    group: DEFAULT_GROUP
    file-extension: yml
    refresh-enabled: true

# 日志配置
logging:
  level:
    root: INFO
    com.cococlown.cococlawservice: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 支付配置
payment:
  # 支付回调地址
  callback:
    base-url: http://localhost:8080
    alipay-path: /api/payment/callback/alipay
    wechat-path: /api/payment/callback/wechat

  # 沙箱环境配置
  sandbox:
    enabled: true

  # 支付宝配置
  alipay:
    app-id: ${ALIPAY_APP_ID:2021000000000000}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
    notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/payment/callback/alipay}
    return-url: ${ALIPAY_RETURN_URL:http://localhost:3000/pay/success}
    sign-type: RSA2
    gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do

  # 微信支付配置
  wechatpay:
    mchid: ${WECHATPAY_MCHID:}
    serial-no: ${WECHATPAY_SERIAL_NO:}
    private-key-path: classpath:cert/apiclient_key.pem
    alipay-cert-path: classpath:cert/wechatpay_cert.pem
    notify-url: ${WECHATPAY_NOTIFY_URL:http://localhost:8080/api/payment/callback/wechat}
    api-key: ${WECHATPAY_API_KEY:}
    appid: ${WECHATPAY_APPID:}
    domain: https://api.mch.weixin.qq.com
